function calcConcentrate(mineral, targetPpmPerDrop, brewMl, bottleMl, dropG) {
  if (mineral.isPreConcentrate) {
    const brewL = brewMl / 1000;
    const mgPerDrop = targetPpmPerDrop * brewL;
    // bottleMl here = amount of distilled water, total volume = water + eidon
    const totalVolMl_approx = bottleMl; // start with water as estimate for drop count
    const dropsPerBottle = totalVolMl_approx / dropG;
    const totalSiO2_mg = mgPerDrop * dropsPerBottle;
    const eidonMl = totalSiO2_mg / EIDON_SILICA_MG_PER_ML;
    const totalBottle = bottleMl + eidonMl;
    const ppmPerMl = (1 / dropG) * targetPpmPerDrop;
    const ppmPerVolume = [0.25, 0.5, 0.75, 1.0].map(v => +(v * ppmPerMl).toFixed(1));
    return { eidonMl, waterMl: bottleMl, totalBottle, totalSiO2_mg, ppmPerVolume, isSilica: true, solubilityOk: true };
  }
  const massPerPpm = mineral.ppmFactor === null ? 1 : mineral.mw / mineral.ppmFactor;
  const brewL = brewMl / 1000;
  const dropsPerBottle = bottleMl / dropG;
  const mineralPerDrop_mg = targetPpmPerDrop * brewL * massPerPpm;
  const totalMineral_g = (mineralPerDrop_mg * dropsPerBottle) / 1000;
  const gPer100ml = (totalMineral_g / bottleMl) * 100;
  const solubilityOk = gPer100ml <= (mineral.solubility || 999);
  const ppmPerMl = (1 / dropG) * targetPpmPerDrop;
  const ppmPerVolume = [0.25, 0.5, 0.75, 1.0].map(v => +(v * ppmPerMl).toFixed(1));
  return { totalMineral_g, solubilityOk, gPer100ml, ppmPerVolume, isSilica: false };
}

function calcWaterStats(mineralAmounts, brewMl) {
  let totalIons = { Ca: 0, Mg: 0, Na: 0, K: 0, Cl: 0, SO4: 0, HCO3: 0 };
  let totalIonsMmol = { Ca: 0, Mg: 0, Na: 0, K: 0, Cl: 0, SO4: 0, HCO3: 0 };
  let silicaPpm = 0;
  mineralAmounts.forEach(({ mineralId, ppm }) => {
    const m = MINERALS.find(x => x.id === mineralId);
    if (!m || !ppm) return;
    if (m.id === "sio2") { silicaPpm = ppm; return; }
    const mmol = m.ppmFactor === null ? ppm / m.mw : ppm / m.ppmFactor;
    const ionsMg = m.ions(mmol);
    const ionsMmol = m.ionMmol(mmol);
    Object.keys(ionsMg).forEach(k => { if (k in totalIons) totalIons[k] += ionsMg[k]; });
    Object.keys(ionsMmol).forEach(k => { if (k in totalIonsMmol) totalIonsMmol[k] += ionsMmol[k]; });
  });
  const GH = (totalIonsMmol.Ca + totalIonsMmol.Mg) * 100;
  const KH = totalIonsMmol.HCO3 * 50;
  const temporaryHardness = Math.min(GH, KH);
  const permanentHardness = GH - temporaryHardness;
  const TDS = Object.values(totalIons).reduce((a, b) => a + b, 0) + silicaPpm;

  // K:Na from buffer sources
  const naBufferMmol = mineralAmounts.filter(a => a.mineralId === "nahco3" && a.ppm > 0).reduce((s, a) => s + a.ppm / 50, 0);
  const kBufferMmol = mineralAmounts.filter(a => a.mineralId === "khco3" && a.ppm > 0).reduce((s, a) => s + a.ppm / 50, 0);

  const conductivity = totalIonsMmol.Ca * 119 + totalIonsMmol.Mg * 106 + totalIonsMmol.Na * 50.1 +
    totalIonsMmol.K * 73.5 + totalIonsMmol.HCO3 * 44.5 + totalIonsMmol.SO4 * 160 + totalIonsMmol.Cl * 76.35;
  const ecTdsReading = conductivity * 0.5;

  const ionAsCaCO3 = {
    Ca: totalIonsMmol.Ca * 100, Mg: totalIonsMmol.Mg * 100,
    Na: totalIonsMmol.Na * 50, K: totalIonsMmol.K * 50,
    Cl: totalIonsMmol.Cl * 50, SO4: totalIonsMmol.SO4 * 100,
    HCO3: totalIonsMmol.HCO3 * 50,
  };

  return { ions: totalIons, ionsMmol: totalIonsMmol, ionAsCaCO3, GH, KH, temporaryHardness, permanentHardness,
    TDS, conductivity, ecTdsReading, silicaPpm, naBufferMmol, kBufferMmol };
}

function solveReverse(targets, availableMinerals) {
  const { gh, kh, caToMg, clToSO4 } = targets;
  const mgMs = availableMinerals.filter(id => MINERALS.find(m => m.id === id)?.subcat === "mg");
  const caMs = availableMinerals.filter(id => MINERALS.find(m => m.id === id)?.subcat === "ca");
  const bufMs = availableMinerals.filter(id => MINERALS.find(m => m.id === id)?.subcat === "buffer");
  if (!mgMs.length || !caMs.length || !bufMs.length) return null;
  const tot = gh / 100, mgMmol = tot / (caToMg + 1), caMmol = caToMg * mgMmol, hco3Mmol = kh / 50;
  const hasMgCl = mgMs.some(id => MINERALS.find(m => m.id === id)?.formula.includes("Cl"));
  const hasMgSO4 = mgMs.some(id => MINERALS.find(m => m.id === id)?.formula.includes("SO"));
  const hasCaCl = caMs.some(id => MINERALS.find(m => m.id === id)?.formula.includes("Cl"));
  const hasCaSO4 = caMs.some(id => MINERALS.find(m => m.id === id)?.formula.includes("SO"));
  const mgClM = mgMs.find(id => MINERALS.find(m => m.id === id)?.formula.includes("Cl"));
  const mgSO4M = mgMs.find(id => MINERALS.find(m => m.id === id)?.formula.includes("SO"));
  const caClM = caMs.find(id => MINERALS.find(m => m.id === id)?.formula.includes("Cl"));
  const caSO4M = caMs.find(id => MINERALS.find(m => m.id === id)?.formula.includes("SO"));
  let f;
  if (!hasMgSO4 && !hasCaSO4) f = 1;
  else if (!hasMgCl && !hasCaCl) f = 0;
  else f = clToSO4 / (2 + clToSO4);
  let mgCl = hasMgCl ? f * mgMmol : 0, mgSO4 = hasMgSO4 ? (1 - f) * mgMmol : 0;
  let caCl = hasCaCl ? f * caMmol : 0, caSO4 = hasCaSO4 ? (1 - f) * caMmol : 0;
  if (!hasMgCl) { mgSO4 = mgMmol; mgCl = 0; } if (!hasMgSO4) { mgCl = mgMmol; mgSO4 = 0; }
  if (!hasCaCl) { caSO4 = caMmol; caCl = 0; } if (!hasCaSO4) { caCl = caMmol; caSO4 = 0; }
  let r = [];
  if (mgCl > 0 && mgClM) r.push({ mineralId: mgClM, ppm: mgCl * 100 });
  if (mgSO4 > 0 && mgSO4M) r.push({ mineralId: mgSO4M, ppm: mgSO4 * 100 });
  if (caCl > 0 && caClM) r.push({ mineralId: caClM, ppm: caCl * 100 });
  if (caSO4 > 0 && caSO4M) r.push({ mineralId: caSO4M, ppm: caSO4 * 100 });
  if (bufMs.length > 0 && hco3Mmol > 0) {
    const per = hco3Mmol / bufMs.length;
    bufMs.forEach(id => r.push({ mineralId: id, ppm: per * 50 }));
  }
  return r;
}

function niceScale(maxVal) {
  if (maxVal <= 0) return { max: 10, ticks: [0, 5, 10] };
  const raw = maxVal * 1.2;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const options = [1, 2, 2.5, 5, 10];
  let step = mag;
  for (const o of options) { if (o * mag >= raw / 4) { step = o * mag; break; } }
  const max = Math.ceil(raw / step) * step;
  const ticks = [];
  for (let i = 0; i <= max; i += step) ticks.push(Math.round(i * 100) / 100);
  if (ticks.length > 6) {
    const t2 = []; for (let i = 0; i < ticks.length; i += 2) t2.push(ticks[i]);
    if (t2[t2.length - 1] !== ticks[ticks.length - 1]) t2.push(ticks[ticks.length - 1]);
    return { max, ticks: t2 };
  }
  return { max, ticks };
}

  return (

      <div style={{ width: "100%", overflowX: "auto" }}>
        <svg width="100%" viewBox={`0 0 ${svgW} ${svgH}`}
          preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
          {/* Gridlines + y-axis labels */}
          {ticks.map((t, i) => {
            const y = topPad + plotH - (t / max) * plotH;
            return (
              <g key={i}>
                <line x1={leftPad} y1={y} x2={leftPad + n * (barW + gap)} y2={y}
                  stroke={i === 0 ? C.textDim : C.border} strokeWidth={i === 0 ? 1 : 0.5}
                  strokeDasharray={i === 0 ? "none" : "4,3"} opacity={i === 0 ? 0.5 : 0.6} />
                <text x={leftPad - 5} y={y + 3} textAnchor="end"
                  fill={C.textDim} fontSize={9} fontFamily="'JetBrains Mono', monospace">
                  {t % 1 === 0 ? t : t.toFixed(1)}
                </text>
              </g>
            );
          })}

          {/* Bars */}
          {data.map((d, i) => {
            const cx = leftPad + i * (barW + gap) + barW / 2;
            const x = leftPad + i * (barW + gap);
            const barH = max > 0 ? (d.value / max) * plotH : 0;
            const y = topPad + plotH - barH;
            const displayVal = d.value === 0 ? "" : d.value >= 10 ? d.value.toFixed(0) : d.value.toFixed(1);
            return (
              <g key={i}>
                {barH > 0 && (
                  <rect x={x + 2} y={y} width={barW - 4} height={barH}
                    rx={3} fill={d.color} />
                )}
                {displayVal && (
                  <text x={cx} y={y - 4} textAnchor="middle"
                    fill={C.textBright} fontSize={10} fontWeight={700}
                    fontFamily="'JetBrains Mono', monospace">
                    {displayVal}
                  </text>
                )}
                <text x={cx} y={topPad + plotH + 15} textAnchor="middle"
                  fill={d.color} fontSize={9.5} fontWeight={600}>
                  {d.label}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

function IonChart({ stats }) {
  const mgLData = ION_DEFS.map(d => ({
    label: d.label, value: stats.ions[d.key] || 0, color: d.color,
  }));
  if (stats.silicaPpm > 0) {
    mgLData.push({ label: "SiO₂", value: stats.silicaPpm, color: "#9a8ab0" });
  }

  const caco3Data = ION_DEFS.map(d => ({
    label: d.label, value: stats.ionAsCaCO3[d.key] || 0, color: d.color,
  }));

  // Shared dimensions so both charts are identical in size with aligned baselines
  const maxBars = Math.max(mgLData.length, caco3Data.length);
  const sharedTopPad = 22;
  const sharedBotPad = 24;
  const sharedPlotH = 120;
  const sharedH = sharedTopPad + sharedPlotH + sharedBotPad;

  return (
    <div style={{ display: "flex", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
      <div style={{ flex: 1, minWidth: 280 }}>
        <VertBarChart title="Ion Composition" data={mgLData} unit="mg/L"
          sharedH={sharedH} sharedTopPad={sharedTopPad} sharedBotPad={sharedBotPad} sharedPlotH={sharedPlotH} maxBars={maxBars} />
      </div>
      <div style={{ flex: 1, minWidth: 280 }}>
        <VertBarChart title="Ion Equivalents" data={caco3Data} unit="ppm as CaCO₃"
          sharedH={sharedH} sharedTopPad={sharedTopPad} sharedBotPad={sharedBotPad} sharedPlotH={sharedPlotH} maxBars={maxBars} />
      </div>
      <div style={{ width: "100%", fontSize: 10, color: C.textDim, padding: "2px 4px", lineHeight: 1.5 }}>
        SiO₂ is uncharged at brew pH (exists as silicic acid) — no CaCO₃ equivalent or conductivity contribution.
      </div>
    </div>
  );
}

// ─── RECIPE ANALYZER ──────────────────────────────────────────────────────────
const RECIPE_MINERALS = MINERALS.filter(m => m.id !== "sio2");

function RecipeAnalyzer({ recipe, setRecipe }) {
  const { mode, brewMl, linked, concVol, dose, grams, perMineral, silicaPpm } = recipe;
  const set = (k, v) => setRecipe(p => ({ ...p, [k]: v }));
  const setGram = (id, v) => setRecipe(p => ({ ...p, grams: { ...p.grams, [id]: v } }));
  const setPM = (id, field, v) => setRecipe(p => ({
    ...p, perMineral: { ...p.perMineral, [id]: { ...(p.perMineral[id] || {}), [field]: v } }
  }));

  const mineralAmounts = useMemo(() => {
    const results = [];
    const brewL = (brewMl || 1000) / 1000;

    RECIPE_MINERALS.forEach(m => {
      const g = grams[m.id];
      if (!g || g <= 0) return;

      let mg_in_brew;
      if (mode === "direct") {
        mg_in_brew = g * 1000;
      } else if (linked) {
        const cv = concVol || 500;
        const d = dose || 1;
        mg_in_brew = (g * 1000 / cv) * d;
      } else {
        const pm = perMineral[m.id] || {};
        const cv = pm.concVol || 50;
        const d = pm.dose || 1;
        mg_in_brew = (g * 1000 / cv) * d;
      }

      const mgPerL = mg_in_brew / brewL;
      let ppm;
      if (m.ppmFactor === null) { ppm = mgPerL; }
      else { ppm = (mgPerL / m.mw) * m.ppmFactor; }

      results.push({ mineralId: m.id, ppm });
    });

    if (silicaPpm > 0) results.push({ mineralId: "sio2", ppm: silicaPpm });
    return results;
  }, [grams, mode, brewMl, linked, concVol, dose, perMineral, silicaPpm]);

  const stats = useMemo(() => calcWaterStats(mineralAmounts, brewMl || 1000), [mineralAmounts, brewMl]);

  // Per-mineral display: show calculated ppm
  const getPpm = (id) => {
    const found = mineralAmounts.find(a => a.mineralId === id);
    return found ? found.ppm : 0;
  };

  return (
    <div>
      <p style={{ fontSize: 12, color: C.textDim, marginBottom: 16, lineHeight: 1.6 }}>
        Paste in someone's recipe — enter grams of each mineral. Supports direct dosing (grams into brew water) and
        concentrate recipes (grams into a concentrate bottle, then dose into brew water).
      </p>

      {/* Mode toggle */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        <Tab active={mode === "direct"} onClick={() => set("mode", "direct")}>Direct Dose</Tab>
        <Tab active={mode === "concentrate"} onClick={() => set("mode", "concentrate")}>From Concentrate</Tab>
      </div>

      {/* Brew volume */}
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
        <div style={{ minWidth: 160 }}>
          <label style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8 }}>
            {mode === "direct" ? "Brew Water Volume" : "Final Brew Water Volume"}
          </label>
          <NI value={brewMl} onChange={v => set("brewMl", v)} min={1} step={100} unit="ml" />
        </div>

        {/* Concentrate params */}
        {mode === "concentrate" && (
          <>
            <div style={{ display: "flex", alignItems: "end", gap: 6, marginBottom: 0 }}>
              <Tab active={linked} onClick={() => set("linked", true)}>All-in-One</Tab>
              <Tab active={!linked} onClick={() => set("linked", false)}>Separate Bottles</Tab>
            </div>
            {linked && (
              <>
                <div style={{ minWidth: 140 }}>
                  <label style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8 }}>Concentrate Water</label>
                  <NI value={concVol} onChange={v => set("concVol", v)} min={1} step={50} unit="ml" />
                </div>
                <div style={{ minWidth: 140 }}>
                  <label style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8 }}>Amount Used</label>
                  <NI value={dose} onChange={v => set("dose", v)} min={0} step={0.1} unit="g ≈ ml" />
                </div>
              </>
            )}
          </>
        )}
      </div>

      {/* Mineral inputs */}
      {CATEGORY_ORDER.map(cat => {
        const mins = RECIPE_MINERALS.filter(m => m.category === cat).sort((a, b) => a.prevalence - b.prevalence);
        if (!mins.length) return null;
        return (
          <div key={cat} style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: catC[cat], marginBottom: 6, letterSpacing: 0.5, textTransform: "uppercase" }}>
              {CATEGORY_LABELS[cat]}
            </div>
            {mins.map(mineral => {
              const g = grams[mineral.id] || "";
              const ppm = getPpm(mineral.id);
              const isCaCO3 = mineral.ppmFactor !== null;
              const pm = perMineral[mineral.id] || {};

              return (
                <div key={mineral.id} style={{
                  display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap",
                  background: C.surface, borderRadius: 6, padding: "6px 12px", border: `1px solid ${C.border}`,
                }}>
                  <div style={{ minWidth: 130, flex: "0 0 130px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.textBright }}>{mineral.common}</div>
                    <div style={{ fontSize: 10, color: C.textDim }}>{mineral.formula}</div>
                  </div>

                  <NI value={g} onChange={v => setGram(mineral.id, v)} min={0} step={0.01}
                    placeholder="0" unit="g" style={{ width: 100 }} />

                  {/* Separate concentrate inputs */}
                  {mode === "concentrate" && !linked && (
                    <>
                      <NI value={pm.concVol || ""} onChange={v => setPM(mineral.id, "concVol", v)}
                        min={1} step={10} placeholder="50" unit="ml conc" style={{ width: 100 }} />
                      <NI value={pm.dose || ""} onChange={v => setPM(mineral.id, "dose", v)}
                        min={0} step={0.1} placeholder="1" unit="g used" style={{ width: 100 }} />
                    </>
                  )}

                  {/* Calculated ppm */}
                  {ppm > 0 && (
                    <div style={{
                      background: C.inputBg, borderRadius: 4, padding: "3px 8px",
                      border: `1px solid ${C.border}`, textAlign: "center",
                    }}>
                      <div style={{ fontSize: 9, color: C.textDim }}>{isCaCO3 ? "ppm CaCO₃" : "mg/L"}</div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: catC[cat], fontFamily: "'JetBrains Mono', monospace" }}>
                        {ppm.toFixed(1)}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Silica input */}
      <div style={{
        display: "flex", alignItems: "center", gap: 8, marginBottom: 4,
        background: C.surface, borderRadius: 6, padding: "6px 12px", border: `1px solid ${C.border}`,
      }}>
        <div style={{ minWidth: 130, flex: "0 0 130px" }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: C.textBright }}>Silica</div>
          <div style={{ fontSize: 10, color: C.textDim }}>SiO₂</div>
        </div>
        <NI value={silicaPpm || ""} onChange={v => set("silicaPpm", v)} min={0} step={0.5}
          placeholder="0" unit="mg/L" style={{ width: 100 }} />
        <div style={{ fontSize: 10, color: C.textDim }}>1 Eidon drop in 2L ≈ 6.25 mg/L</div>
      </div>

      {/* Results */}
      <div style={{ marginTop: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textBright, marginBottom: 10 }}>Recipe Analysis</div>

        {/* Summary of calculated ppm */}
        {mineralAmounts.length > 0 && (
          <div style={{
            background: C.surfaceAlt, borderRadius: 8, padding: 12, marginBottom: 12,
            border: `1px solid ${C.border}`,
          }}>
            <div style={{ fontSize: 10, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>
              Mineral Breakdown
            </div>
            {mineralAmounts.map(({ mineralId, ppm }) => {
              const m = MINERALS.find(x => x.id === mineralId);
              const isCaCO3 = m.ppmFactor !== null;
              const g = grams[mineralId] || 0;
              const brewL = (brewMl || 1000) / 1000;
              let mgPerL;
              if (m.id === "sio2") { mgPerL = ppm; }
              else if (mode === "direct") { mgPerL = (g * 1000) / brewL; }
              else if (linked) { mgPerL = (g * 1000 / (concVol || 500)) * (dose || 1) / brewL; }
              else { const pm2 = perMineral[mineralId] || {}; mgPerL = (g * 1000 / (pm2.concVol || 50)) * (pm2.dose || 1) / brewL; }

              return (
                <div key={mineralId} style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 4, fontSize: 12 }}>
                  <span style={{ color: C.textBright, fontWeight: 600, minWidth: 120 }}>{m.common}</span>
                  <span style={{ color: C.textDim, fontFamily: "'JetBrains Mono', monospace", minWidth: 70 }}>
                    {mgPerL.toFixed(1)} mg/L
                  </span>
                  {isCaCO3 && (
                    <span style={{ color: catC[m.category], fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>
                      → {ppm.toFixed(1)} ppm CaCO₃
                    </span>
                  )}
                  {!isCaCO3 && m.id !== "sio2" && (
                    <span style={{ color: catC[m.category], fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>
                      → {ppm.toFixed(1)} mg/L
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        )}

        <WaterStats stats={stats} />
      </div>
    </div>
  );
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("concentrate");
  const [gp, setGp] = useState({ brewMl: 500, bottleMl: 30, dropG: 0.043 });
  const [cd, setCd] = useState(() => {
    const d = {};
    MINERALS.forEach(m => { d[m.id] = 1; });
    return d;
  });
  const [mode, setMode] = useState("forward");

  // Forward crafter state (lifted so it persists across tab switches)
  const [fwdAmounts, setFwdAmounts] = useState({
    mgcl2_6h2o: 13, nacl: 13, nahco3: 8,
  });

  // Reverse crafter state (lifted)
  const [revTargets, setRevTargets] = useState({ gh: 60, kh: 20, caToMg: 1.3, clToSO4: 1.0 });
  const [revSel, setRevSel] = useState(["mgcl2_6h2o", "mgso4_7h2o", "cacl2_2h2o", "nahco3"]);

  // Recipe analyzer state (lifted)
  const [recipe, setRecipe] = useState({
    mode: "direct", brewMl: 1000, linked: true, concVol: 500, dose: 2,
    grams: {}, perMineral: {}, silicaPpm: 0,
  });

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Segoe UI', -apple-system, sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
      <div style={{ background: `linear-gradient(135deg, ${C.headerBg} 0%, ${C.surface} 100%)`,
        borderBottom: `1px solid ${C.border}`, padding: "16px 20px", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 24 }}>💧</span>
            <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: C.textBright, letterSpacing: -0.5 }}>Water Lab</h1>
            <span style={{ fontSize: 10, color: C.textDim, background: C.accent + "15", padding: "2px 8px", borderRadius: 99 }}>
              Specialty Coffee Water Crafter
            </span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <Tab active={tab === "concentrate"} onClick={() => setTab("concentrate")}>🧪 Concentrate Maker</Tab>
            <Tab active={tab === "crafter"} onClick={() => setTab("crafter")}>⚗️ Water Crafter</Tab>
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px 60px" }}>
        {tab === "concentrate" && <ConcentrateMaker globalParams={gp} setGlobalParams={setGp} concentrateData={cd} setConcentrateData={setCd} />}
        {tab === "crafter" && (
          <div>
            <SH icon="⚗️">Water Crafter</SH>
            <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
              <Tab active={mode === "forward"} onClick={() => setMode("forward")}>Minerals → Stats</Tab>
              <Tab active={mode === "reverse"} onClick={() => setMode("reverse")}>Targets → Recipe</Tab>
              <Tab active={mode === "recipe"} onClick={() => setMode("recipe")}>📋 Recipe Analyzer</Tab>
            </div>
            {mode === "forward" && <ForwardCrafter globalParams={gp} concentrateData={cd} amounts={fwdAmounts} setAmounts={setFwdAmounts} />}
            {mode === "reverse" && <ReverseCrafter globalParams={gp} concentrateData={cd} targets={revTargets} setTargets={setRevTargets} sel={revSel} setSel={setRevSel} />}
            {mode === "recipe" && <RecipeAnalyzer recipe={recipe} setRecipe={setRecipe} />}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
